services:
  opencode-connect:
    build:
      context: .
      dockerfile: Containerfile
    container_name: opencode-connect
    restart: unless-stopped
    ports:
      - "8192:8192"
    volumes:
      - ./configs/config.container.yaml:/app/configs/config.yaml:ro
    environment:
      OPENCODE_CONNECT_PLUGINS_CHATAPI_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - -c
      - /app/configs/config.yaml
