log:
  handlers:
    default: "default"
  providers:
    default:
      - format: "console"
        level: "info"
        verbosity: 3
        attrs: {}
        output:
          stdout:
            enable: true
          stderr:
            enable: false
          file:
            enable: false
            path: "/var/log/opencode-connect/opencode-connect.log"
            maxSize: "10mb"
            maxAge: "7d"
            maxBackups: 10
            compress: true

plugins:
  chatapi:
    enabled: true
    listen: ":8192"
    read_timeout: 15s
    write_timeout: 300s
    idle_timeout: 60s
  ume:
    enabled: false
  mattermost:
    enabled: false

opencode:
  base_url: "http://127.0.0.1:4096"
  password: ""
  password_header: "Authorization"
  password_scheme: "Bearer"
  directory: "."
  prompt_timeout: 5m
  default_provider: ""
  default_model: ""
  session_title_tpl: "chat-session-{session_id}"
  model_aliases:
    gpt-5.4: "openai/gpt-5.4"
    sonnet: "anthropic/claude-sonnet-4-20250514"
  extra_headers: {}

