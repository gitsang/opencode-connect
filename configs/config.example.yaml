log:
  handlers:
    default: "default"
  providers:
    default:
      - format: "console"
        level: "info"
        verbosity: 3
        attrs: {}
        output:
          stdout:
            enable: true
          stderr:
            enable: false
          file:
            enable: false
            path: "/var/log/opencode-connect/opencode-connect.log"
            maxSize: "10mb"
            maxAge: "7d"
            maxBackups: 10
            compress: true

plugins:
  chatapi:
    enabled: true
    listen: ":8192"
    read_timeout: 15s
    write_timeout: 300s
    idle_timeout: 60s

opencode:
  base_url: "http://127.0.0.1:4096"
  username: ""
  password: ""
